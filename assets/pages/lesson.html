<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Details</title>
    <link rel="stylesheet" href="../css/StaffDashboard.css">
    <style>
        :root {
            --maroon: rgb(70,0,0);
            --green: #2d6a4f;
            --red: #b91c1c;
            --amber: #b45309;
            --blue: #1d4ed8;
            --surface: #ffffff;
            --bg: #f5f4f0;
            --border: rgba(0,0,0,0.07);
            --ink: #1a1a18;
            --ink-2: #5a5a56;
            --ink-3: #9a9a96;
        }

        body {
            font-family: 'Istok Web', sans-serif;
            background: var(--bg);
            padding: 0;
            margin: 0;
            color: var(--ink);
        }

        .lesson-page-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .lesson-back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Istok Web', sans-serif;
            font-size: 14px;
            color: var(--ink-2);
            text-decoration: none;
            z-index: 100;
            transition: background 0.15s, color 0.15s;
        }

        .lesson-back-btn:hover {
            background: var(--bg);
            color: var(--maroon);
        }

        .lesson-content-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 60px 40px 40px 40px;
        }

        .lesson-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .lesson-title {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--ink);
        }

        .lesson-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .lesson-meta-item {
            font-size: 14px;
            color: var(--ink-3);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .lesson-content {
            background: var(--surface);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 16px;
            color: var(--ink);
        }

        .lesson-content h3 {
            margin-top: 0;
            color: var(--maroon);
        }

        /* ═══ SUBMISSION PANEL ═══ */
        .submission-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .submission-panel h3 {
            margin: 0 0 16px 0;
            font-size: 16px;
            font-weight: 700;
            color: var(--ink);
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, rgba(70,0,0,0.02) 0%, transparent 100%);
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: var(--maroon);
            background: linear-gradient(135deg, rgba(70,0,0,0.08) 0%, transparent 100%);
        }

        .drop-zone-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .drop-icon {
            font-size: 32px;
        }

        .drop-text {
            color: var(--ink-2);
            font-size: 14px;
            margin: 0;
        }

        .drop-subtext {
            color: var(--ink-3);
            font-size: 12px;
        }

        #file-input {
            display: none;
        }

        .file-list {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-item {
            background: var(--bg);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .file-name {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--ink);
        }

        .remove-file {
            background: none;
            border: none;
            color: var(--red);
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
            transition: color 0.15s;
        }

        .remove-file:hover {
            color: #8b1c1c;
        }

        .submission-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-family: 'Istok Web', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .btn-primary {
            background: var(--maroon);
            color: white;
        }

        .btn-primary:hover {
            background: #520000;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            background: var(--ink-3);
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--ink-2);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(70,0,0,0.05);
            color: var(--maroon);
        }

        .submission-status {
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }

        .submission-status.success {
            background: #e8f5ee;
            color: var(--green);
            display: block;
        }

        .submission-status.error {
            background: #fee2e2;
            color: var(--red);
            display: block;
        }

        /* ═══ RESOURCES SECTION ═══ */
        .resources-section {
            background: var(--surface);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .resources-title {
            margin: 0 0 16px 0;
            font-size: 16px;
            font-weight: 700;
            color: var(--ink);
        }

        .resource-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .resource-item {
            padding: 12px;
            background: var(--bg);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            transition: background 0.15s;
        }

        .resource-item:hover {
            background: rgba(70,0,0,0.05);
        }

        .resource-name {
            color: var(--maroon);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .resource-size {
            color: var(--ink-3);
            font-size: 12px;
        }

        .activity-badge {
            display: inline-block;
            padding: 2px 8px;
            background: #fee2e2;
            color: var(--red);
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        @media (max-width: 1024px) {
            .lesson-content-main {
                padding: 60px 24px 24px 24px;
            }
            .lesson-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="lesson-page-container">
        <a href="#" class="lesson-back-btn" onclick="history.back(); return false;">← Back</a>
        
        <div class="lesson-content-main">
            <div class="lesson-header">
                <div>
                    <h1 class="lesson-title" id="lesson-title">Lesson Title</h1>
                    <div class="lesson-meta">
                        <div class="lesson-meta-item">
                            📅 <span id="lesson-date">Date</span>
                        </div>
                        <div class="lesson-meta-item" id="activity-type" style="display:none;">
                            🎯 Activity (Scorable)
                        </div>
                    </div>
                </div>
            </div>

            <div class="lesson-content" id="lesson-content">
                <h3>Lesson Overview</h3>
                <p>This lesson covers important concepts and practices.</p>
            </div>

            <!-- SUBMISSION PANEL (Only for Activities) -->
            <div class="submission-panel" id="submission-panel" style="display: none;">
                <h3>Submit Your Work</h3>
                <div class="drop-zone" id="drop-zone">
                    <div class="drop-zone-content">
                        <div class="drop-icon">📁</div>
                        <p class="drop-text">Drag and drop your files here</p>
                        <p class="drop-subtext">or click to browse</p>
                    </div>
                </div>
                <input type="file" id="file-input" multiple>
                <div class="file-list" id="file-list"></div>
                <div class="submission-actions">
                    <button class="btn btn-primary" id="submit-btn" disabled>Submit</button>
                    <button class="btn btn-secondary" id="clear-btn">Clear Files</button>
                </div>
                <div class="submission-status" id="submission-status"></div>
            </div>

            <!-- RESOURCES SECTION -->
            <div class="resources-section" id="resources-section" style="display: none;">
                <h3 class="resources-title">Resources</h3>
                <div class="resource-list" id="resource-list"></div>
            </div>
        </div>
    </div>

    <script>
        // Get lesson info from URL
        const params = new URLSearchParams(window.location.search);
        const title = params.get('title') || 'Lesson Title';
        const isActivity = params.get('type') === 'activity' || params.get('type') === 'Activity';
        const dueDate = params.get('dueDate') || 'Apr 15, 2026';

        document.getElementById('lesson-title').textContent = title;
        document.getElementById('lesson-date').textContent = dueDate;

        if (isActivity) {
            document.getElementById('activity-type').style.display = 'flex';
            document.getElementById('submission-panel').style.display = 'block';
        }

        // Dummy resources
        const resources = [
            { name: 'Database Design Guide.pdf', size: '2.4 MB' },
            { name: 'ER-Diagram Examples.docx', size: '1.1 MB' },
            { name: 'SQL Cheat Sheet.pdf', size: '0.8 MB' }
        ];

        if (resources.length > 0) {
            document.getElementById('resources-section').style.display = 'block';
            const resourceList = document.getElementById('resource-list');
            resources.forEach(res => {
                const item = document.createElement('div');
                item.className = 'resource-item';
                item.innerHTML = `
                    <a href="#" class="resource-name">
                        📄 ${res.name}
                    </a>
                    <span class="resource-size">${res.size}</span>
                `;
                resourceList.appendChild(item);
            });
        }

        // File upload handling
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileList = document.getElementById('file-list');
        const submitBtn = document.getElementById('submit-btn');
        const clearBtn = document.getElementById('clear-btn');
        const submissionStatus = document.getElementById('submission-status');

        let selectedFiles = [];

        // Click to browse
        dropZone.addEventListener('click', () => fileInput.click());

        // Drag and drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const files = Array.from(e.dataTransfer.files);
            handleFiles(files);
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            handleFiles(files);
        });

        function handleFiles(files) {
            selectedFiles = files;
            renderFileList();
            submitBtn.disabled = selectedFiles.length === 0;
        }

        function renderFileList() {
            fileList.innerHTML = '';
            selectedFiles.forEach((file, idx) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <span class="file-name">
                        <span>📎</span>
                        <span>${file.name}</span>
                    </span>
                    <button type="button" class="remove-file" onclick="removeFile(${idx})">Remove</button>
                `;
                fileList.appendChild(item);
            });
        }

        window.removeFile = function(idx) {
            selectedFiles.splice(idx, 1);
            renderFileList();
            submitBtn.disabled = selectedFiles.length === 0;
        };

        clearBtn.addEventListener('click', () => {
            selectedFiles = [];
            fileInput.value = '';
            renderFileList();
            submissionStatus.style.display = 'none';
            submitBtn.disabled = true;
        });

        submitBtn.addEventListener('click', () => {
            submissionStatus.className = 'submission-status success';
            submissionStatus.textContent = '✓ Files submitted successfully!';
            setTimeout(() => {
                submissionStatus.style.display = 'none';
                clearBtn.click();
            }, 3000);
        });

        // Update content based on lesson type
        if (isActivity) {
            document.getElementById('lesson-content').innerHTML = `
                <h3>Activity Instructions</h3>
                <p>This is a scorable activity. Submit your completed work below.</p>
                <p>Make sure your submission includes all required files and meets the assignment criteria.</p>
            `;
        } else {
            document.getElementById('lesson-content').innerHTML = `
                <h3>Lesson Content</h3>
                <p>This lesson covers important concepts and practices. Review the content and resources below.</p>
            `;
        }
    </script>
</body>
</html>
