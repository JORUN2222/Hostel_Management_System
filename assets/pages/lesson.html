<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Details</title>
    <link rel="stylesheet" href="../css/StaffDashboard.css">
    <style>
        .lesson-detail-container {
            max-width: 700px;
            margin: 3rem auto;
            background: #fff;
            border-radius: 1.5rem;
            box-shadow: 0 2px 12px #0002;
            padding: 2.5rem 2rem;
        }
        .lesson-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        .lesson-date {
            color: #ff9c6e;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }
        .lesson-content {
            font-size: 1.1rem;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="lesson-detail-container">
        <div class="lesson-title" id="lesson-title">Lesson Title</div>
        <div class="lesson-date" id="lesson-date">Date</div>
        <div class="lesson-content" id="lesson-content">
            <h3>Content Here</h3>
        </div>
        <div class="upload-container">
            <!-- Files Here -->
        </div>
    </div>
    <script>
        // Example: Get lesson title from URL
        const params = new URLSearchParams(window.location.search);
        const title = params.get('title') || 'Lesson Title';
        document.getElementById('lesson-title').textContent = title;
        // Optionally, you can add logic to display different content based on the title
    </script>
</body>
</html>
