<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>
    <link rel="shortcut icon" href="../img/basc-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Istok+Web:ital,wght@0,400;0,700;1,400;1,700&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html"><img style="width: 50px;" src="../img/cropped-logo-192x192.png" alt=""></a>
            <p>Bulacan State Agricultural University </p>
        </div>
        <nav>
            <ul>
                <li><a href="..">Home</a></li>
                <li><a href="..">About</a></li>
                <li><a href="..">Contact us</a></li>
                <li><a href="..">Discover</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <article>
            <form action=".." method="post">
                <img src="../img/cropped-logo-192x192.png" alt="">
                <h3>Hostel Management System</h3>
                <hr>
                <div class="input-container">
                    <label for="mail">Email</label>
                    <input type="email" name="mail" id="mail" placeholder="Enter your Email">
                    <label for="passwords">Password</label>
                    <input type="password" name="passwords" id="passwords" placeholder="Enter your Password">

                    <div class="showpassword_box">
                        <input type="checkbox" id="showPassword" onclick="togglePasswordVisibility()">
                        <label for="showPassword">Show password</label>
                    </div>

                    <input type="submit" value="Login">
                    <small style="display: flex; justify-content: center;">Don't have an account yet?<a style="margin-inline: 5px;" href="signup.html">SignUp</a>here!</small>
                </div>
            </form>
        </article>
        <!-- <footer>
            footer
        </footer> -->
    </main>
</body>
<script src="../js/showpass.js"></script>
</html>
